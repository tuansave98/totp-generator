<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2FA TOTP Generator</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --card: #1a1d28;
      --border: #2d3150;
      --accent: #5b6af7;
      --accent2: #a78bfa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 60px;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .sub {
      text-align: center;
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ── Textarea key input ── */
    .key-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px 14px;
      margin-bottom: 20px;
    }

    .key-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .key-header label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }

    .key-actions {
      display: flex;
      gap: 6px;
    }

    .btn-sm {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px 10px;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-sm:hover {
      border-color: var(--red);
      color: var(--red);
    }

    #secretArea {
      width: 100%;
      min-height: 160px;
      max-height: 320px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
    }

    #secretArea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 106, 247, .15);
    }

    #secretArea::placeholder {
      color: var(--muted);
    }

    .key-hint {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 7px;
    }

    /* ── Cards list ── */
    #cardsList {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── single OTP row ── */
    .otp-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ring */
    .ring-wrap {
      position: relative;
      flex-shrink: 0;
      width: 52px;
      height: 52px;
    }

    .ring-wrap svg {
      transform: rotate(-90deg);
    }

    .ring-fg {
      transition: stroke-dashoffset .95s linear, stroke .3s;
    }

    .ring-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      font-weight: 700;
    }

    /* code */
    .code-wrap {
      flex: 1;
      min-width: 0;
    }

    .code-key-label {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .otp-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: #fff;
      cursor: pointer;
      user-select: all;
      transition: color .3s, transform .15s;
      display: inline-block;
      line-height: 1.1;
      padding: 2px 0;
    }

    .otp-code:hover {
      opacity: .85;
    }

    .otp-code:active {
      transform: scale(.96);
    }

    .otp-code.warn {
      color: var(--yellow);
    }

    .otp-code.danger {
      color: var(--red);
    }



    /* progress */
    .prog-bar {
      height: 3px;
      border-radius: 99px;
      background: rgba(255, 255, 255, .06);
      margin-top: 8px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .95s linear, background .3s;
    }

    .prog-fill.warn {
      background: linear-gradient(90deg, var(--yellow), #f59e0b);
    }

    .prog-fill.danger {
      background: linear-gradient(90deg, var(--red), #ef4444);
    }

    /* error row */
    .otp-row.err-row {
      border-color: rgba(248, 113, 113, .25);
      background: rgba(248, 113, 113, .04);
    }

    .err-label {
      font-size: .78rem;
      color: var(--red);
    }

    /* empty */
    .empty-tip {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      padding: 32px 16px;
      line-height: 1.8;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--green);
      color: #04231a;
      padding: 9px 22px;
      border-radius: 99px;
      font-size: .82rem;
      font-weight: 700;
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>🔐 2FA TOTP Generator</h1>
    <p class="sub">Dán một hoặc nhiều secret key — mỗi dòng một tài khoản</p>

    <div class="key-box">
      <div class="key-header">
        <label>Secret Keys</label>
        <div class="key-actions">
          <button class="btn-sm" id="clearBtn">✕ Xoá hết</button>
        </div>
      </div>
      <textarea id="secretArea"
        placeholder="Dán key vào đây, mỗi dòng 1 key&#10;JBSWY3DPEHPK3PXP&#10;HXDMVJECJJWSRB3HWIZR…" spellcheck="false"
        autocomplete="off"></textarea>
      <div class="key-hint">💡 Nhấn vào mã OTP để sao chép</div>
    </div>

    <div id="cardsList">
      <div class="empty-tip">Chưa có key nào. Dán key vào ô trên để bắt đầu.</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Base32 decode ─────────────────────────────────────────────────────────
    function base32Decode(str) {
      const A = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      str = str.toUpperCase().replace(/[\s=]/g, '');
      let bits = 0, val = 0;
      const out = [];
      for (const ch of str) {
        const i = A.indexOf(ch);
        if (i < 0) throw new Error('bad char: ' + ch);
        val = (val << 5) | i; bits += 5;
        if (bits >= 8) { out.push((val >>> (bits - 8)) & 0xff); bits -= 8; }
      }
      return new Uint8Array(out);
    }

    // ── TOTP RFC 6238 ─────────────────────────────────────────────────────────
    async function totp(secret, period = 30, digits = 6) {
      const key = base32Decode(secret);
      const ctr = Math.floor(Date.now() / 1000 / period);
      const buf = new ArrayBuffer(8);
      const dv = new DataView(buf);
      dv.setUint32(0, Math.floor(ctr / 0x100000000) >>> 0, false);
      dv.setUint32(4, ctr >>> 0, false);
      const ck = await crypto.subtle.importKey('raw', key,
        { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
      const sig = new Uint8Array(await crypto.subtle.sign('HMAC', ck, buf));
      const off = sig[sig.length - 1] & 0x0f;
      const n = (
        ((sig[off] & 0x7f) << 24) |
        ((sig[off + 1] & 0xff) << 16) |
        ((sig[off + 2] & 0xff) << 8) |
        (sig[off + 3] & 0xff)
      ) % (10 ** digits);
      return String(n).padStart(digits, '0');
    }

    // ── State ─────────────────────────────────────────────────────────────────
    const CIRC = 2 * Math.PI * 21; // r=21 → ≈131.95
    const PERIOD = 30;

    // rows[i] = { key, valid, lastPeriod, domRefs }
    let rows = [];

    // ── DOM ───────────────────────────────────────────────────────────────────
    const area = document.getElementById('secretArea');
    const clearBtn = document.getElementById('clearBtn');
    const cardsList = document.getElementById('cardsList');
    const toast = document.getElementById('toast');

    // ── Parse textarea → keys ─────────────────────────────────────────────────
    function parseKeys() {
      return area.value
        .split('\n')
        .map(l => l.trim().replace(/\s/g, ''))
        .filter(Boolean);
    }

    // ── Build / sync rows ─────────────────────────────────────────────────────
    function syncRows() {
      const keys = parseKeys();

      if (!keys.length) {
        rows = [];
        cardsList.innerHTML = '<div class="empty-tip">Chưa có key nào. Dán key vào ô trên để bắt đầu.</div>';
        return;
      }

      // rebuild entirely when count changes
      rows = keys.map((key, idx) => {
        let valid = true;
        try { base32Decode(key); } catch { valid = false; }
        return { key, valid, lastPeriod: -1 };
      });

      cardsList.innerHTML = rows.map((r, i) => {
        const short = r.key.length > 20 ? r.key.slice(0, 10) + '…' + r.key.slice(-6) : r.key;
        if (!r.valid) {
          return `
          <div class="otp-row err-row" id="row-${i}">
            <span class="err-label">⚠ Key #${i + 1} không hợp lệ: <code style="font-size:.75em">${escHtml(short)}</code></span>
          </div>`;
        }
        return `
        <div class="otp-row" id="row-${i}">
          <div class="ring-wrap">
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle cx="26" cy="26" r="21" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="3.5"/>
              <circle class="ring-fg" id="rf-${i}" cx="26" cy="26" r="21" fill="none" stroke="#5b6af7"
                stroke-width="3.5" stroke-dasharray="${CIRC.toFixed(2)}" stroke-dashoffset="0" stroke-linecap="round"/>
            </svg>
            <div class="ring-num" id="rn-${i}">30</div>
          </div>
          <div class="code-wrap">
            <div class="code-key-label">#${i + 1} · ${escHtml(short)}</div>
            <div class="otp-code" id="oc-${i}" onclick="copyCode(this)" title="Nhấn để sao chép">------</div>

            <div class="prog-bar"><div class="prog-fill" id="pf-${i}" style="width:100%"></div></div>
          </div>
        </div>`;
      }).join('');

      // cache dom refs
      rows.forEach((r, i) => {
        if (!r.valid) return;
        r.dom = {
          rf: document.getElementById('rf-' + i),
          rn: document.getElementById('rn-' + i),
          oc: document.getElementById('oc-' + i),
          pf: document.getElementById('pf-' + i),
        };
      });
    }

    // ── Tick ──────────────────────────────────────────────────────────────────
    const now = () => Date.now() / 1000;
    const remaining = () => PERIOD - (now() % PERIOD);

    async function tick() {
      const rem = remaining();
      const pct = rem / PERIOD;
      const cp = Math.floor(now() / PERIOD);
      const sec = Math.ceil(rem);
      const state = rem <= 5 ? 'danger' : rem <= 10 ? 'warn' : '';
      const col = rem <= 5 ? 'var(--red)' : rem <= 10 ? 'var(--yellow)' : 'var(--accent)';
      const tcol = rem <= 5 ? 'var(--red)' : rem <= 10 ? 'var(--yellow)' : 'var(--text)';

      for (const r of rows) {
        if (!r.valid || !r.dom) continue;
        const { rf, rn, oc, pf } = r.dom;

        // update code when period flips
        if (cp !== r.lastPeriod) {
          r.lastPeriod = cp;
          totp(r.key).then(code => {
            oc.style.transform = 'scale(1.05)';
            setTimeout(() => oc.style.transform = '', 150);
            oc.textContent = code.slice(0, 3) + ' ' + code.slice(3);
          }).catch(() => { oc.textContent = 'ERR'; });
        }

        // timer UI
        rf.style.strokeDashoffset = (CIRC * (1 - pct)).toFixed(2);
        pf.style.width = (pct * 100).toFixed(1) + '%';
        rn.textContent = sec;
        oc.className = 'otp-code ' + state;
        pf.className = 'prog-fill ' + state;
        rf.style.stroke = col;
        rn.style.color = tcol;
      }

      requestAnimationFrame(tick);
    }

    // ── Copy on click ─────────────────────────────────────────────────────────
    async function copyCode(el) {
      const raw = el.textContent.replace(/\s/g, '');
      if (!raw || raw === '------' || raw === 'ERR') return;
      try {
        await navigator.clipboard.writeText(raw);
        const prev = el.textContent;
        el.style.color = 'var(--green)';
        el.textContent = '✓ ' + raw;
        showToast('✅ Đã sao chép: ' + raw);
        setTimeout(() => {
          el.textContent = prev;
          el.style.color = '';
        }, 1500);
      } catch {
        showToast('⚠️ Không thể sao chép');
      }
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── Events ────────────────────────────────────────────────────────────────
    let debounce;
    area.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(syncRows, 120);
    });

    clearBtn.addEventListener('click', () => {
      area.value = '';
      syncRows();
      area.focus();
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    syncRows();
    tick();
  </script>
</body>

</html>
